spring:
  application:
    name: skillstep-api

  datasource:
    url: jdbc:postgresql://localhost:5432/skillstep_db
    username: skillstep_user
    password: skillstep_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
